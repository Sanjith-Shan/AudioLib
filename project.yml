name: AudioLib
options:
  bundleIdPrefix: com.sanjith
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

packages:
  YouTubeKit:
    url: https://github.com/alexeichhorn/YouTubeKit
    from: 0.2.5

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_PREVIEWS: YES
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  AudioLib:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AudioLib
        excludes:
          - "**/*.md"
    info:
      path: AudioLib/Info.plist
    dependencies:
      - package: YouTubeKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanjith.audiolib
        INFOPLIST_FILE: AudioLib/Info.plist
        DEVELOPMENT_ASSET_PATHS: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  AudioLibTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AudioLibTests
    dependencies:
      - target: AudioLib
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanjith.audiolibTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AudioLib.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AudioLib"
        BUNDLE_LOADER: "$(TEST_HOST)"

  AudioLibUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AudioLibUITests
    dependencies:
      - target: AudioLib
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanjith.audiolibUITests
        TEST_TARGET_NAME: AudioLib
