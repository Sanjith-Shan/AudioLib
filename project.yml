name: AudioLib
options:
  bundleIdPrefix: com.sanjith
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

packages:
  YouTubeKit:
    url: https://github.com/alexeichhorn/YouTubeKit
    from: 0.2.5

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: YES
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    CODE_SIGN_STYLE: Automatic

targets:
  AudioLib:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AudioLib
        excludes:
          - "**/*.md"
          - "*.entitlements"
    info:
      path: AudioLib/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIBackgroundModes:
          - audio
    entitlements:
      path: AudioLib/AudioLib.entitlements
      properties: {}
    dependencies:
      - package: YouTubeKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanjith.audiolib
        INFOPLIST_FILE: AudioLib/Info.plist
        DEVELOPMENT_ASSET_PATHS: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_ENTITLEMENTS: AudioLib/AudioLib.entitlements

  AudioLibMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: AudioLib
        excludes:
          - "**/*.md"
      - path: AudioLibMac
        excludes:
          - "**/*.md"
          - "*.entitlements"
    info:
      path: AudioLibMac/Info.plist
      properties:
        LSMinimumSystemVersion: "14.0"
        NSLocalNetworkUsageDescription: "Used to communicate with the companion download server on your local network."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        LSApplicationCategoryType: public.app-category.productivity
    entitlements:
      path: AudioLibMac/AudioLibMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
    dependencies:
      - package: YouTubeKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanjith.audiolib.mac
        PRODUCT_NAME: AudioLib
        INFOPLIST_FILE: AudioLibMac/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: AudioLibMac/AudioLibMac.entitlements

  AudioLibTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AudioLibTests
    dependencies:
      - target: AudioLib
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanjith.audiolibTests
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AudioLib.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AudioLib"
        BUNDLE_LOADER: "$(TEST_HOST)"

  AudioLibUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AudioLibUITests
    dependencies:
      - target: AudioLib
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanjith.audiolibUITests
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TEST_TARGET_NAME: AudioLib
